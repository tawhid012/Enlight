# Netlify Configuration for Enlight Coaching Centre

[build]
  # Build command - runs Tailwind CSS production build
  command = "npm run build"
  
  # Directory containing the deployed files
  publish = "."
  
  # Node version
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18.16.0"
  NPM_VERSION = "9.6.4"

# Cache settings
[[headers]]
  for = "/dist/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect rules
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
